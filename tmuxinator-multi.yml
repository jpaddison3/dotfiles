# ~/.tmuxinator/dev.yml
name: <%= ENV['TMUX_SESSION'] || 'dev' %>
root: ~/
windows:
  - 80k:
      layout: tiled
      root: ~/80k/advisorbot/<%= ENV['MINERVA_DIR'] || 'minerva' %>
      panes:
        -
        -
        - xx<%= ENV['MINERVA_PORT'] ? " PORT=#{ENV['MINERVA_PORT']}" : '' %> npm run dev:log
        -
  - 80k-other:
      layout: tiled
      root: ~/80k
      panes:
        -
        -
        -
        -
  - forum:
      layout: tiled
      root: ~/cea/Forum/ForumMagnum
      panes:
        -
        -
        -
        -
  - repl:
      layout: even-horizontal
      root: ~
      panes:
        - py313 && ipython
        - node
  - personal:
      layout: tiled
      root: ~/personal-coding
      panes:
        -
        -
        - cd ../Documents/dotfiles
        -
  - misc:
      layout: tiled
      root: ~
      panes:
        -
        -
        -
        -
